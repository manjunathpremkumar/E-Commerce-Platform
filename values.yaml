# Root values — E-Commerce Platform
global:
  environment: production
  cluster: eks-prod-us-east-1

login-service:
  replicaCount: 4 # AI: Scale replicas to 4 per ML analysis recommendation
  image:
    repository: ecr.example.com/login-service
    tag: "1.2.0"
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m # AI: Increased limit to accommodate higher replica count and traffic stability
      memory: 4Gi # AI: Increased limit to support scaled replicas
  env:
    - name: JAVA_OPTS
      value: "-Xms3072m -Xmx3072m" # AI: Adjusted heap size for optimal performance at higher replica count

payment-service:
  replicaCount: 3
  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 4Gi

search-service:
  replicaCount: 3
  resources:
    requests:
      cpu: 2000m
      memory: 4Gi
    limits:
      cpu: 4000m
      memory: 8Gi