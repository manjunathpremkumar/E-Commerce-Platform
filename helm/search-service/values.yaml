replicaCount: 3

image:
  repository: ecr.example.com/search-service
  tag: "3.0.1"

resources:
  requests:
    cpu: 2000m
    memory: 4Gi
  limits:
    cpu: 4000m
    memory: 8Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 12

env:
  - name: JAVA_OPTS
    value: "-Xms2g -Xmx6g -XX:+UseG1GC"
