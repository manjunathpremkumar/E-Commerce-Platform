replicaCount: 3

image:
  repository: ecr.example.com/payment-service
  tag: "2.1.0"

resources:
  requests:
    cpu: 1000m
    memory: 2Gi
  limits:
    cpu: 2000m
    memory: 4Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 65

env:
  - name: JAVA_OPTS
    value: "-Xms2g -Xmx4g -XX:+UseZGC" # AI: Increased heap to match limits and switched GC from G1GC to ZGC