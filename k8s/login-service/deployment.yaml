---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: login-service
  labels:
    app: login-service
    tier: backend
spec:
  replicas: 4 # AI: Scale replicas to 4 per ML analysis recommendation
  selector:
    matchLabels:
      app: login-service
  template:
    metadata:
      labels:
        app: login-service
    spec:
      containers:
        - name: login-service
          image: ecr.example.com/login-service:1.2.0 # AI: Updated tag to reflect new deployment version
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m # AI: Increased limit to accommodate higher replica count and traffic stability
              memory: 4Gi # AI: Increased limit to support scaled replicas
          env:
            - name: JAVA_OPTS
              value: "-Xms3072m -Xmx3072m" # AI: Adjusted heap size for optimal performance at higher replica count
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5