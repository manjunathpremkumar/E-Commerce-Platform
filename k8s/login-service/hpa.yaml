---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: login-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: login-service
  minReplicas: 4 # AI: Increased minimum replicas to match new baseline and reduce cold start risk
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70